<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D&D Tavolo Proiettore - V28 Master Edition</title>
    <style>
        /* Regola globale per margini perfetti */
        *, *::before, *::after { box-sizing: border-box; }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050505; font-family: sans-serif; touch-action: none; color: #eee; }
        
        #viewport { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        #world-container { position: absolute; top: 0; left: 0; transform-origin: 0 0; will-change: transform; width: 0; height: 0; }
        
        /* Overflow hidden taglia disegni, nebbia e meteo al bordo del layer */
        .layer-wrapper { position: absolute; top: 0; left: 0; transform-origin: center; will-change: transform; overflow: hidden; }
        
        /* Gestione Z-index interna al wrapper per i vari strati */
        .layer-img { width: 100%; height: 100%; object-fit: fill; display: block; pointer-events: none; border: none; z-index: 1; }
        .layer-atmosphere { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; transition: background 1.5s, mix-blend-mode 1.5s; }
        .fog-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 3; }
        .layer-drawings { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; z-index: 4; }
        
        @keyframes ping-anim {
            0% { transform: scale(0); opacity: 1; border-width: 10px; }
            100% { transform: scale(4); opacity: 0; border-width: 1px; }
        }
        .ping-marker { position: absolute; width: 60px; height: 60px; background: radial-gradient(circle, rgba(255,50,50,0.6) 0%, transparent 70%); border: 3px solid red; border-radius: 50%; transform-origin: center; animation: ping-anim 1.5s ease-out; pointer-events: none; z-index: 9999; margin-left: -30px; margin-top: -30px; }

        /* Filtri Atmosfera (Applicati al layer specifico) */
        @keyframes pulse-fire { 0% { background: rgba(255, 60, 0, 0.25); } 100% { background: rgba(200, 20, 0, 0.4); } }
        @keyframes rain-fall { 0% { background-position: 0px 0px, 0px 0px; } 100% { background-position: 100px 1000px, 50px 700px; } }
        @keyframes snow-fall { 0% { background-position: 0px 0px, 0px 0px; } 100% { background-position: 100px 400px, -50px 600px; } }

        .filter-night { background: rgba(0, 20, 60, 0.65); mix-blend-mode: multiply; }
        .filter-fire { mix-blend-mode: color; animation: pulse-fire 2s infinite alternate; }
        .filter-sepia { background: rgba(150, 100, 50, 0.35); mix-blend-mode: multiply; }
        .filter-swamp { background: rgba(30, 80, 20, 0.5); mix-blend-mode: multiply; }
        .filter-blood { background: rgba(120, 0, 0, 0.6); mix-blend-mode: multiply; }
        
        /* Pioggia Parallasse Realistica */
        .filter-rain {
            background-color: rgba(10, 20, 30, 0.15); /* Leggero imbrunire tempestoso */
            background-image: 
                /* Primo piano: Gocce grandi e sparse, sferzate dal vento */
                url("data:image/svg+xml,%3Csvg width='300' height='300' xmlns='http://www.w3.org/2000/svg'%3E%3Cline x1='20' y1='20' x2='28' y2='60' stroke='rgba(220,230,255,0.3)' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='180' y1='100' x2='188' y2='140' stroke='rgba(220,230,255,0.2)' stroke-width='1.2' stroke-linecap='round'/%3E%3Cline x1='100' y1='220' x2='108' y2='260' stroke='rgba(220,230,255,0.25)' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E"),
                /* Secondo piano: Gocce sottili, per dare profondità */
                url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cline x1='50' y1='50' x2='54' y2='75' stroke='rgba(200,220,255,0.15)' stroke-width='1' stroke-linecap='round'/%3E%3Cline x1='150' y1='120' x2='154' y2='145' stroke='rgba(200,220,255,0.1)' stroke-width='0.8' stroke-linecap='round'/%3E%3C/svg%3E");
            animation: rain-fall 0.5s linear infinite;
        }
        
        .filter-snow {
            background-color: rgba(200, 220, 240, 0.15);
            background-image: url("data:image/svg+xml,%3Csvg width='50' height='50' viewBox='0 0 50 50' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='25' cy='25' r='2' fill='rgba(255,255,255,0.8)'/%3E%3C/svg%3E"),
                              url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='40' cy='40' r='3.5' fill='rgba(255,255,255,0.4)'/%3E%3C/svg%3E");
            animation: snow-fall 4s linear infinite;
        }

        #calibration-square { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 4px solid #ff3333; background: rgba(255, 51, 51, 0.3); z-index: 1000; pointer-events: none; width: 50px; height: 50px; display: none; }
        
        /* UI Panel e Accordion */
        #ui-panel { position: absolute; top: 10px; left: 10px; z-index: 950; background: rgba(20,20,20,0.95); padding: 12px; border-radius: 8px; border: 1px solid #444; width: 330px; max-height: 90vh; overflow-y: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.9); transition: opacity 0.2s; }
        
        .acc-btn { width: 100%; text-align: left; background: #2b2b2b; color: #fff; padding: 10px; font-size: 13px; text-transform: uppercase; font-weight: bold; border: 1px solid #444; border-radius: 4px; margin-bottom: 5px; cursor: pointer; transition: 0.2s; }
        .acc-btn:hover { background: #3b3b3b; }
        .acc-btn.active { background: #0056b3; border-color: #007bff; border-bottom-left-radius: 0; border-bottom-right-radius: 0; margin-bottom: 0; }
        .acc-content { display: none; background: #1a1a1a; border: 1px solid #444; border-top: none; padding: 10px; border-bottom-left-radius: 4px; border-bottom-right-radius: 4px; margin-bottom: 5px; }
        
        label { font-size: 11px; font-weight: bold; color: #aaa; display: block; margin: 8px 0 3px 0; text-transform: uppercase; }
        input[type="file"], input[type="range"], select { width: 100%; margin-bottom: 8px; }
        input[type="file"] { font-size: 12px; color: #ccc; }
        select { background: #333; color: white; border: 1px solid #555; padding: 5px; border-radius: 4px; }
        
        button { padding: 6px; font-size: 12px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; background: #444; color: white; transition: 0.1s; width: 100%; }
        button:active { transform: scale(0.95); }
        
        .row { display: flex; gap: 4px; margin-bottom: 8px; }
        .row button { flex: 1; margin: 0; background: #333; border: 1px solid #222; display: flex; align-items: center; justify-content: center;}
        .row button.active { background: #007bff; border-color: #66b0ff; box-shadow: inset 0 0 5px rgba(0,0,0,0.5); }
        
        /* Strumenti specifici */
        .color-btn { width: 30px; height: 30px; border-radius: 50%; flex: none !important; border: 2px solid transparent !important; }
        .color-btn.active { border-color: white !important; transform: scale(1.1); box-shadow: 0 0 8px currentColor; }
        .bg-red { background-color: #ff3333 !important; color: #ff3333; }
        .bg-green { background-color: #33ff33 !important; color: #33ff33; }
        .bg-yellow { background-color: #ffff33 !important; color: #ffff33; }
        
        .list-container { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
        .item-row { display: flex; align-items: center; flex-wrap: wrap; background: #222; padding: 4px; border-radius: 4px; border: 1px solid #333; gap: 2px;}
        .item-row.active { border-color: #5cb85c; background: #1a2a1a; }
        .item-name { flex: 1; min-width: 60px; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; padding: 4px; }
        .btn-icon { width: 22px; height: 22px; padding: 0; background: #333; font-size: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;}
        .btn-icon:hover { background: #555; }
        .btn-icon.on { background: #f0ad4e; color: black; }
        .btn-icon.danger { background: #d9534f; color: white; }
        .btn-relink { width: 100%; background: #e67e22; color: #000; margin-top: 4px; padding: 4px; font-size: 11px;}
        
        #btn-fullscreen { background-color: #17a2b8; padding: 10px; font-size: 14px; margin-top: 5px; }
        #hide-ui { background-color: #5cb85c; padding: 10px; font-size: 14px; margin-top: 5px; }
        .hidden { display: none !important; opacity: 0; pointer-events: none; }
        #reveal-ui { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(0,0,0,0.6); color: white; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; border: 2px solid rgba(255,255,255,0.4); cursor: pointer; transition: opacity 0.2s; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: flex; justify-content: center; align-items: center; flex-direction: column; color: white; font-size: 20px; display: none; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #5cb85c; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-overlay"><div class="spinner"></div><div id="loading-text">Caricamento...</div></div>

<div id="ui-panel">
    <div class="row" style="margin-bottom: 12px;">
        <button id="btn-save-project" style="background: #e0a800; color: #000;">💾 Salva</button>
        <button id="btn-load-trigger" style="background: #138496;">📂 Carica</button>
        <input type="file" id="upload-project" accept=".json" class="hidden">
    </div>

    <div class="acc-btn active">🎬 Mappe e Livelli</div>
    <div class="acc-content" style="display: block;">
        <div class="list-container" id="scene-list"></div>
        <button id="btn-new-scene" style="background: #0056b3; margin-bottom:10px;">+ Nuova Scena</button>
        
        <label>Aggiungi alla Scena:</label>
        <div class="row">
            <button id="btn-upload-trigger" style="background: #555;">📁 Img / Video</button>
            <button id="btn-yt-layer" style="background: #cc0000;">🔴 YouTube</button>
            <input type="file" id="upload-layer" accept="image/*,video/*" class="hidden">
        </div>
        <div class="list-container" id="layer-list" style="margin-top: 8px;"></div>
    </div>

    <div class="acc-btn">⚙️ Strumenti Master</div>
    <div class="acc-content">
        <label>Navigazione:</label>
        <div class="row">
            <button id="tool-camera" class="active">🌍 Camera</button>
            <button id="tool-layer">✋ Sposta Layer</button>
        </div>
        <button id="btn-lock-camera" style="margin-bottom: 8px; background: #333;">🔓 Camera Sbloccata</button>
        <div class="row">
            <button id="btn-zoom-out">🔍 -</button>
            <button id="btn-zoom-in">🔍 +</button>
        </div>

        <label>Nebbia di Guerra:</label>
        <div class="row">
            <button id="tool-draw">⬛ + Nebbia</button>
            <button id="tool-erase">🧽 - Nebbia</button>
        </div>
        <div class="row">
            <button id="clear-fog" style="background:#d9534f;">Pulisci</button>
            <button id="fill-fog" style="background:#555;">Copri</button>
        </div>

        <label>Evidenziatore (Sul Layer):</label>
        <div class="row" style="justify-content: space-between;">
            <button id="tool-hl-red" class="color-btn bg-red" title="Rosso"></button>
            <button id="tool-hl-green" class="color-btn bg-green" title="Verde"></button>
